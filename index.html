<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lineup Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d8a4e;--green-dk:#1e6b3a;--green-lt:#3aa060;
  --pitch-line:rgba(255,255,255,0.32);
  --bg:#f0ede8;--surface:#ffffff;--text:#1a1a18;--muted:#888;
  --border:rgba(0,0,0,0.1);--accent:#1a6ef5;
  --font:'Barlow',sans-serif;--font-num:'Barlow Condensed',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#141412;--surface:#1e1e1c;--text:#f0ede8;--muted:#666;--border:rgba(255,255,255,0.1)}
}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;
}
.team-input{
  font-family:var(--font);font-size:18px;font-weight:700;
  border:none;background:transparent;color:var(--text);
  outline:none;width:180px;letter-spacing:-.3px;
}
.saved-tag{font-size:11px;color:#27ae60;font-weight:600;opacity:0;transition:opacity .4s}
.saved-tag.show{opacity:1}

/* CONTROLS */
.controls{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
}
.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg-btn{
  padding:6px 14px;font-family:var(--font);font-size:13px;font-weight:600;
  background:transparent;border:none;cursor:pointer;color:var(--muted);
  transition:all .15s;letter-spacing:.2px;
}
.seg-btn.on{background:var(--accent);color:#fff}
.ctrl-select{
  padding:6px 10px;font-family:var(--font);font-size:13px;font-weight:600;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--text);cursor:pointer;
  letter-spacing:.2px;
}
.swatches{display:flex;gap:5px;align-items:center;margin-left:auto}
.swatch{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .15s;flex-shrink:0;
}
.swatch.on{border-color:var(--text);transform:scale(1.2)}

/* PITCH */
.pitch-wrap{padding:14px;display:flex;justify-content:center}
.pitch{
  position:relative;width:100%;max-width:370px;
  aspect-ratio:0.60;
  background:var(--green);border-radius:14px;
  border:3px solid var(--green-dk);overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.25);
}
.pitch-stripes{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    to bottom,transparent 0 8.33%,rgba(0,0,0,.04) 8.33% 16.66%);
}
.fl{position:absolute;background:var(--pitch-line)}
.fl-h{width:100%;height:1.5px}
.fl-v{height:100%;width:1.5px;left:50%}
.fc{position:absolute;border:1.5px solid var(--pitch-line);border-radius:50%}
.fb{position:absolute;border:1.5px solid var(--pitch-line)}
.cdot{
  position:absolute;width:7px;height:7px;
  background:var(--pitch-line);border-radius:50%;
  left:50%;top:50%;transform:translate(-50%,-50%);
}

/* PLAYER TOKEN */
.token{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;z-index:10;transition:filter .15s;
}
.token:active{filter:brightness(1.2)}
.tok-circle{
  width:40px;height:40px;border-radius:50%;
  background:#fff;border:3px solid #9b59b6;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-num);font-size:14px;font-weight:700;
  color:#111;box-shadow:0 2px 10px rgba(0,0,0,.45);
  transition:transform .12s;
}
.token:active .tok-circle{transform:scale(1.1)}
.tok-circle.empty{
  background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.4);
  color:rgba(255,255,255,.5);box-shadow:none;font-size:10px;
}
.tok-label{
  margin-top:3px;font-size:9px;font-weight:700;letter-spacing:.3px;
  color:#fff;background:rgba(0,0,0,.55);padding:1px 5px;
  border-radius:3px;max-width:60px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;
}

/* BOTTOM SHEET */
.sheet-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.48);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.sheet-bg.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:78vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.56,1);
}
.sheet-bg.open .sheet{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;background:var(--border);
  border-radius:2px;margin:10px auto 0;flex-shrink:0;
}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sheet-title{font-size:15px;font-weight:700;letter-spacing:.2px}
.sheet-close{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--bg);color:var(--muted);cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
}
.player-list{overflow-y:auto;flex:1}
.p-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.p-item:active,.p-item:hover{background:var(--bg)}
.p-item.used{opacity:.32;pointer-events:none}
.p-item.current{background:rgba(26,110,245,.08)}
.p-num{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-num);font-size:13px;font-weight:700;
  color:var(--text);flex-shrink:0;
}
.p-info{flex:1;min-width:0}
.p-shirt{font-size:14px;font-weight:700}
.p-full{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-pos{
  font-size:10px;font-weight:700;padding:2px 7px;
  border-radius:4px;letter-spacing:.5px;flex-shrink:0;
}
.pos-GK{background:#fdefd3;color:#c47d0a}
.pos-DEF{background:#d3e8fd;color:#0a5ec4}
.pos-MID{background:#d3fde8;color:#0a9e4a}
.pos-FWD{background:#fdd3d3;color:#c40a0a}
.sheet-clear{
  width:100%;padding:14px;border:none;border-top:1px solid var(--border);
  background:transparent;color:#e74c3c;font-family:var(--font);
  font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;
}
.hint{
  text-align:center;padding:6px;
  font-size:11px;color:rgba(255,255,255,.55);
  font-weight:600;letter-spacing:.3px;
}
</style>
</head>
<body>

<header class="header">
  <input class="team-input" id="teamName" value="" maxlength="20" placeholder="Team name">
  <span class="saved-tag" id="savedTag">Saved ✓</span>
</header>

<div class="controls">
  <div class="seg">
    <button class="seg-btn on" id="btn11" onclick="setMode(11)">FUT 11</button>
    <button class="seg-btn" id="btn7" onclick="setMode(7)">FUT 7</button>
  </div>
  <select class="ctrl-select" id="fmSelect" onchange="setFormation(this.value)"></select>
  <div class="swatches" id="swatches"></div>
</div>

<div class="pitch-wrap">
  <div class="pitch" id="pitch">
    <div class="pitch-stripes"></div>
    <div class="fl fl-h" style="top:50%"></div>
    <div class="fl fl-v"></div>
    <div class="cdot"></div>
    <!-- center circle -->
    <div class="fc" style="width:26%;padding-bottom:26%;left:37%;top:50%;transform:translateY(-50%)"></div>
    <!-- top penalty box -->
    <div class="fb" style="width:58%;left:21%;top:0;height:16%;border-top:none"></div>
    <div class="fb" style="width:28%;left:36%;top:0;height:7%;border-top:none"></div>
    <!-- bottom penalty box -->
    <div class="fb" style="width:58%;left:21%;bottom:0;height:16%;border-bottom:none"></div>
    <div class="fb" style="width:28%;left:36%;bottom:0;height:7%;border-bottom:none"></div>
    <!-- goals -->
    <div class="fb" style="width:18%;left:41%;top:0;height:3%;border-top:none;border-color:rgba(255,255,255,.6)"></div>
    <div class="fb" style="width:18%;left:41%;bottom:0;height:3%;border-bottom:none;border-color:rgba(255,255,255,.6)"></div>
    <div id="tokens"></div>
  </div>
</div>
<div class="hint" id="hint">Tap a position to assign a player</div>

<!-- BOTTOM SHEET -->
<div class="sheet-bg" id="sheetBg" onclick="handleBgClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title" id="sheetTitle">Select player</span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="player-list" id="playerList"></div>
    <button class="sheet-clear" onclick="clearSlot()">Remove player from slot</button>
  </div>
</div>

<script>
// ─── ROSTER ───────────────────────────────────────────────────
const ROSTER = [
  {id:0,  name:'Fernando Garza',         shirt:'Garza',     num:'99',  pos:'GK'},
  {id:1,  name:'Luis Roberto Velázquez', shirt:'Velázquez', num:'2',   pos:'DEF'},
  {id:2,  name:'Alonso Martínez',        shirt:'Maldini',   num:'3',   pos:'DEF'},
  {id:3,  name:'Armando Ledinich',       shirt:'Ledinich',  num:'23',  pos:'DEF'},
  {id:4,  name:'Mateo Zepeda',           shirt:'Zepeda',    num:'777', pos:'DEF'},
  {id:5,  name:'Diego Armando Mijares',  shirt:'Diego',     num:'5',   pos:'MID'},
  {id:6,  name:'Josh Kenig',             shirt:'Josh',      num:'8',   pos:'MID'},
  {id:7,  name:'Cesar Emiliano Méndez',  shirt:'Méndez',    num:'10',  pos:'MID'},
  {id:8,  name:'Avelino Fernández',      shirt:'Ave',       num:'11',  pos:'MID'},
  {id:9,  name:'Alan Augusto Celma',     shirt:'Alan',      num:'19',  pos:'MID'},
  {id:10, name:'Ricardo Esteban Gaspar', shirt:'Gaspar',    num:'25',  pos:'MID'},
  {id:11, name:'Gerardo Contreras',      shirt:'Gerardo',   num:'7',   pos:'FWD'},
];

// ─── FORMATIONS ───────────────────────────────────────────────
// pos arrays: [x%, y%] from top-left; GK always at bottom (~88%)
const FM11 = {
  '4-4-2': {
    labels:['GK','LB','CB','CB','RB','LM','CM','CM','RM','ST','ST'],
    pos:[[50,88],[12,70],[35,70],[65,70],[88,70],[12,50],[35,50],[65,50],[88,50],[35,28],[65,28]]
  },
  '4-3-3': {
    labels:['GK','LB','CB','CB','RB','CM','CM','CM','LW','ST','RW'],
    pos:[[50,88],[12,70],[35,70],[65,70],[88,70],[25,50],[50,50],[75,50],[18,26],[50,22],[82,26]]
  },
  '4-2-3-1': {
    labels:['GK','LB','CB','CB','RB','CDM','CDM','LW','CAM','RW','ST'],
    pos:[[50,88],[12,70],[35,70],[65,70],[88,70],[33,60],[67,60],[18,44],[50,42],[82,44],[50,25]]
  },
  '3-5-2': {
    labels:['GK','CB','CB','CB','LWB','CM','CM','CM','RWB','ST','ST'],
    pos:[[50,88],[22,70],[50,70],[78,70],[8,52],[28,50],[50,50],[72,50],[92,52],[35,28],[65,28]]
  },
  '3-4-3': {
    labels:['GK','CB','CB','CB','LM','CM','CM','RM','LW','ST','RW'],
    pos:[[50,88],[22,70],[50,70],[78,70],[12,52],[38,52],[62,52],[88,52],[18,28],[50,24],[82,28]]
  },
  '4-1-4-1': {
    labels:['GK','LB','CB','CB','RB','DM','LM','CM','CM','RM','ST'],
    pos:[[50,88],[12,70],[35,70],[65,70],[88,70],[50,60],[12,44],[37,44],[63,44],[88,44],[50,26]]
  },
  '5-3-2': {
    labels:['GK','LWB','CB','CB','CB','RWB','CM','CM','CM','ST','ST'],
    pos:[[50,88],[8,68],[27,70],[50,70],[73,70],[92,68],[25,50],[50,50],[75,50],[35,28],[65,28]]
  },
};

const FM7 = {
  '2-3-1': {
    labels:['GK','LB','RB','LM','CM','RM','ST'],
    pos:[[50,88],[28,70],[72,70],[18,52],[50,50],[82,52],[50,28]]
  },
  '3-2-1': {
    labels:['GK','LB','CB','RB','LM','RM','ST'],
    pos:[[50,88],[18,70],[50,70],[82,70],[33,50],[67,50],[50,28]]
  },
  '2-2-2': {
    labels:['GK','LB','RB','LM','RM','ST','ST'],
    pos:[[50,88],[28,70],[72,70],[28,50],[72,50],[33,28],[67,28]]
  },
  '1-3-2': {
    labels:['GK','CB','LM','CM','RM','ST','ST'],
    pos:[[50,88],[50,72],[18,52],[50,50],[82,52],[35,28],[65,28]]
  },
  '3-1-2': {
    labels:['GK','LB','CB','RB','CM','ST','ST'],
    pos:[[50,88],[18,70],[50,70],[82,70],[50,52],[35,28],[65,28]]
  },
};

// ─── KIT COLORS ───────────────────────────────────────────────
const KITS = ['#9b59b6','#e74c3c','#1a6ef5','#27ae60','#e67e22','#1abc9c','#2c3e50','#f39c12'];

// ─── STATE ────────────────────────────────────────────────────
let state = {
  teamName: 'Los Guardianes',
  mode: 11,
  formation: '4-4-2',
  kitColor: KITS[0],
  lineups: {}  // key: "11_4-4-2" -> [rosterId|null, ...]
};
let activeSlot = null;

// ─── STORAGE ──────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('lineup_builder_v1', JSON.stringify(state));
    const tag = document.getElementById('savedTag');
    tag.classList.add('show');
    clearTimeout(tag._t);
    tag._t = setTimeout(() => tag.classList.remove('show'), 1800);
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('lineup_builder_v1');
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e) {}
}

// ─── LINEUP HELPERS ───────────────────────────────────────────
function lineupKey() { return `${state.mode}_${state.formation}`; }

function getLineup() {
  const key = lineupKey();
  if (!state.lineups[key]) {
    const fm = state.mode === 11 ? FM11 : FM7;
    state.lineups[key] = fm[state.formation].pos.map(() => null);
  }
  return state.lineups[key];
}

function usedIds() {
  return new Set(getLineup().filter(x => x !== null));
}

// ─── CONTROLS ─────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  document.getElementById('btn11').classList.toggle('on', m === 11);
  document.getElementById('btn7').classList.toggle('on', m === 7);
  const fms = m === 11 ? FM11 : FM7;
  // keep formation if valid, else default
  if (!fms[state.formation]) state.formation = Object.keys(fms)[0];
  rebuildSelect();
  render();
  save();
}

function setFormation(f) {
  state.formation = f;
  render();
  save();
}

function rebuildSelect() {
  const sel = document.getElementById('fmSelect');
  const fms = state.mode === 11 ? FM11 : FM7;
  sel.innerHTML = Object.keys(fms).map(k =>
    `<option value="${k}" ${k === state.formation ? 'selected' : ''}>${k}</option>`
  ).join('');
}

function buildSwatches() {
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = KITS.map((c, i) =>
    `<div class="swatch${c === state.kitColor ? ' on' : ''}" style="background:${c}"
      onclick="setKit('${c}')"></div>`
  ).join('');
}

function setKit(c) {
  state.kitColor = c;
  buildSwatches();
  render();
  save();
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  const fm = (state.mode === 11 ? FM11 : FM7)[state.formation];
  const lineup = getLineup();
  const wrap = document.getElementById('tokens');
  wrap.innerHTML = '';

  fm.pos.forEach(([x, y], i) => {
    const pid = lineup[i];
    const player = pid !== null ? ROSTER[pid] : null;

    const div = document.createElement('div');
    div.className = 'token';
    div.style.left = x + '%';
    div.style.top = y + '%';
    div.onclick = () => openSheet(i);

    const circle = document.createElement('div');
    circle.className = 'tok-circle' + (player ? '' : ' empty');
    circle.style.borderColor = player ? state.kitColor : '';
    circle.textContent = player ? player.num : fm.labels[i];

    const label = document.createElement('div');
    label.className = 'tok-label';
    label.textContent = player ? player.shirt : '';

    div.appendChild(circle);
    div.appendChild(label);
    wrap.appendChild(div);
  });

  document.getElementById('teamName').value = state.teamName;
}

// ─── BOTTOM SHEET ─────────────────────────────────────────────
function openSheet(slotIdx) {
  activeSlot = slotIdx;
  const fm = (state.mode === 11 ? FM11 : FM7)[state.formation];
  document.getElementById('sheetTitle').textContent = `${fm.labels[slotIdx]} — Assign player`;

  const lineup = getLineup();
  const used = usedIds();
  const currentPid = lineup[slotIdx];

  const list = document.getElementById('playerList');
  list.innerHTML = ROSTER.map(p => {
    const isUsed = used.has(p.id) && p.id !== currentPid;
    const isCurrent = p.id === currentPid;
    return `<div class="p-item${isUsed ? ' used' : ''}${isCurrent ? ' current' : ''}"
      onclick="assignPlayer(${p.id})">
      <div class="p-num">${p.num}</div>
      <div class="p-info">
        <div class="p-shirt">${p.shirt}</div>
        <div class="p-full">${p.name}</div>
      </div>
      <span class="p-pos pos-${p.pos}">${p.pos}</span>
    </div>`;
  }).join('');

  document.getElementById('sheetBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheetBg').classList.remove('open');
  document.body.style.overflow = '';
  activeSlot = null;
}

function handleBgClick(e) {
  if (e.target === document.getElementById('sheetBg')) closeSheet();
}

function assignPlayer(pid) {
  if (activeSlot === null) return;
  getLineup()[activeSlot] = pid;
  closeSheet();
  render();
  save();
}

function clearSlot() {
  if (activeSlot === null) return;
  getLineup()[activeSlot] = null;
  closeSheet();
  render();
  save();
}

// ─── TEAM NAME ────────────────────────────────────────────────
document.getElementById('teamName').addEventListener('input', function() {
  state.teamName = this.value;
  save();
});

// ─── INIT ─────────────────────────────────────────────────────
load();
rebuildSelect();
buildSwatches();
render();
</script>
</body>
</html>
